name: email

# Gmail over IMAP with an App Password. Runs here because Workers can't speak IMAP;
# it only writes matching mail to D1, and the Worker's cron classifies it. Public
# repos get unlimited free Actions minutes, so a tight schedule is fine.
#
# It never prints email contents — only counts. The app password is an encrypted
# secret; the mailbox is opened read-only.

on:
  schedule:
    - cron: "*/20 * * * *"   # every 20 minutes
  workflow_dispatch:

# Don't stack runs if one is slow.
concurrency:
  group: email
  cancel-in-progress: true

jobs:
  email:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt
      - run: pip install -r pipeline/requirements.txt
      - name: Poll Gmail over IMAP
        working-directory: pipeline
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          D1_DB_ID: ${{ secrets.D1_DB_ID }}
          GMAIL_ADDRESS: ${{ vars.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python -m grabber.main email
