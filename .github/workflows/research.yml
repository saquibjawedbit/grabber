name: research

# Dispatched by the agent when a question deserves more than a quick lookup.
# Runs a research agent on a real machine: browses, reads, pulls transcripts,
# cross-checks, and writes a cited report back to D1.
#
# PRIVACY: this repo is public, so its build logs are public. The runner prints
# only progress markers and URLs it fetched — never the owner's memories, profile
# or the report body. It reads the question from D1 by id; the id is all that
# travels through the dispatch payload. Do not add `echo`s of job content here.

on:
  repository_dispatch:
    types: [research]
  workflow_dispatch:
    inputs:
      job_id:
        description: research job id (row in the research table)
        required: true

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt
      - run: pip install -r pipeline/requirements.txt
      - name: Install browser
        run: python -m playwright install --with-deps chromium
      - name: Run research agent
        working-directory: pipeline
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          D1_DB_ID: ${{ secrets.D1_DB_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GOOGLE_CSE_KEY: ${{ secrets.GOOGLE_CSE_KEY }}
          GOOGLE_CSE_ID: ${{ vars.GOOGLE_CSE_ID }}
          DASH_URL: ${{ vars.DASH_URL }}
        run: |
          JOB="${{ github.event.client_payload.job_id }}${{ inputs.job_id }}"
          python -m grabber.main research "$JOB"
