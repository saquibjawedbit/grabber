# RSS pack. Add anything with a feed; obscure > popular (point 2).
# weight multiplies the recall score for that feed (default 1.0).
feeds:
  - name: MLH events
    url: https://mlh.io/feed.xml
    weight: 0.8            # popular board -> penalized
  - name: Devpost new hackathons
    url: https://devpost.com/hackathons.rss
    weight: 0.7            # very popular -> penalized harder
