name = "grabber"
main = "src/index.js"
compatibility_date = "2026-01-01"

[assets]
directory = "public"
binding = "ASSETS"

[vars]
# Google Programmable Search engine id (public). Pair with `wrangler secret put
# GOOGLE_CSE_KEY` to give web_search its primary backend (free 100 queries/day).
GOOGLE_CSE_ID = "271772a3accdf45e5"
# Where spawn_research dispatches its jobs.
GH_REPO = "saquibjawedbit/grabber"

# Workers AI: powers the conversational agent (gpt-oss-120b, free neurons).
[ai]
binding = "AI"

[[d1_databases]]
binding = "DB"
database_name = "grabber"
database_id = "f3e409f6-bac3-4606-8f3b-0737b57a5660"

# Vectorize: memory recall/dedup across the WHOLE memory set (the old JS scan capped
# at the newest 400 rows). D1 stays the source of truth; this index holds only vectors
# and is rebuildable via /api/vector-backfill. Create it once with:
#   npx wrangler vectorize create grabber-memories --dimensions=384 --metric=cosine
[[vectorize]]
binding = "VECTORIZE"
index_name = "grabber-memories"

# Hourly: reminders fire on the hour; deadline nags escalate at most once per level.
[triggers]
crons = ["0 * * * *"]

# Workers Logs (free tier) — without this a killed webhook turn leaves no trace at all,
# which is why the silent-no-reply bug was invisible. View: dashboard → Worker → Logs.
[observability]
enabled = true

# Secrets (set with `wrangler secret put <NAME>`):
#   TELEGRAM_BOT_TOKEN   — same bot as the pipeline
#   TELEGRAM_CHAT_ID     — your chat with the bot
#   TG_WEBHOOK_SECRET    — random string, also passed to setWebhook
#   DASH_TOKEN           — random string gating /api/* and the dashboard
#   GH_TOKEN             — fine-grained PAT, Contents:read-write on GH_REPO only,
#                          so spawn_research can dispatch the research workflow
#   SERPER_API_KEY       — optional; primary web_search provider + the planner's one
#                          search per plan (serper.dev, free 2,500 credits)
#   GOOGLE_CSE_KEY       — optional; web_search fallback (free 100/day)
#   NOTIFY_SECRET        — shared with the phone's notification forwarder
#   GOOGLE_CLIENT_ID     — } read-only Gmail + Calendar. Get all three by running
#   GOOGLE_CLIENT_SECRET — } pipeline/scripts/google_auth.py
#   GOOGLE_REFRESH_TOKEN — }
